<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAG-ASA Cooperative - Sign In</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!--# include file="header.html" -->
<main class="auth-wrap">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-subtext">Sign in to check your balances, trades, and transfers.</p>
    <form action="#" method="post">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="********">
      </div>
      <div class="form-row">
        <label class="checkbox-label"><input type="checkbox" name="remember"> Remember me</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit">Sign In</button>
    </form>
    <p class="auth-footer-text">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>
</main>
<!--#include file="footer.html" -->
</body>
</html>
