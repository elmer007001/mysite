<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyApp - Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!--# include file="header.html" -->
<main class="auth-wrap">
  <div class="auth-card">
    <h2>Create Account</h2>
    <form action="#" method="post">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="********">
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required placeholder="********">
      </div>
      <button type="submit">Sign Up</button>
    </form>
    <p class="auth-footer-text">Already have an account? <a href="signin.html">Sign in</a></p>
  </div>
</main>
<footer class="site-footer">&copy; 2026 MyApp. All rights reserved.</footer>
</body>
</html>
